# Journey-default btop.

# install.sh symlinks the active theme's btop file to
# ~/.config/btop/themes/journey.theme, so this name resolves no matter which
# Journey theme is active.
color_theme = "journey"
theme_background = true
truecolor = true

vim_keys = true
rounded_corners = true
update_ms = 1500
proc_sorting = "cpu lazy"
proc_reversed = false
proc_tree = false
proc_per_core = false
proc_mem_bytes = true
cpu_graph_upper = "Auto"
cpu_graph_lower = "Auto"
cpu_invert_lower = true
cpu_single_graph = false
show_uptime = true
check_temp = true
cpu_sensor = "Auto"
show_coretemp = true
temp_scale = "celsius"
show_cpu_freq = true
clock_format = "%X"
background_update = true
custom_cpu_name = ""
disks_filter = ""
mem_graphs = true
show_swap = true
swap_disk = true
show_disks = true
only_physical = true
use_fstab = true
zfs_hide_datasets = false
disk_free_priv = false
show_io_stat = true
io_mode = false
io_graph_combined = false
io_graph_speeds = ""
net_download = 100
net_upload = 100
net_auto = true
net_sync = true
net_iface = ""
show_battery = true
selected_battery = "Auto"
log_level = "WARNING"
