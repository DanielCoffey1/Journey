# Journey-default autostart.
exec-once = uwsm-app -- hypridle
exec-once = uwsm-app -- mako
exec-once = ! journey-toggle-enabled waybar-off && uwsm-app -- waybar
exec-once = uwsm-app -- fcitx5 --disable notificationitem
exec-once = uwsm-app -- swaybg -i ~/.config/journey/current/background -m fill
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = journey-first-run
exec-once = journey-powerprofiles-init
exec-once = uwsm-app -- journey-hyprland-monitor-watch

# Slow app launch fix — propagate env to user systemd / dbus
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1)
exec-once = dbus-update-activation-environment --systemd --all

# Post-boot hooks (small delay so startup config has loaded)
exec-once = sleep 2 && journey-hook post-boot
