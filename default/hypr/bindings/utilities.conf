# Journey-default utility bindings — menus, captures, toggles, etc.

# Menus
bindd = SUPER, SPACE, Launch apps (Journey Companion), exec, journey-launch-companion
bindd = SUPER CTRL, E, Emoji picker, exec, journey-launch-companion -m symbols
bindd = SUPER CTRL, C, Capture menu, exec, journey-menu capture
bindd = SUPER CTRL, O, Toggle menu, exec, journey-menu toggle
bindd = SUPER CTRL, H, Hardware menu, exec, journey-menu hardware
bindd = SUPER ALT, SPACE, Journey menu, exec, journey-menu
bindd = SUPER SHIFT, code:201, Journey menu, exec, journey-menu
bindd = SUPER, ESCAPE, System menu, exec, journey-menu system
bindld = , XF86PowerOff, Power menu, exec, journey-menu system
bindd = SUPER, K, Show key bindings, exec, journey-menu-keybindings
bindd = , XF86Calculator, Calculator, exec, gnome-calculator

# Aesthetics
bindd = SUPER SHIFT, SPACE, Toggle top bar, exec, journey-toggle-waybar
bindd = SUPER CTRL, SPACE, Theme background menu, exec, journey-menu background
bindd = SUPER SHIFT CTRL, SPACE, Theme menu, exec, journey-menu theme
bindd = SUPER, BACKSPACE, Toggle window transparency, exec, journey-hyprland-window-transparency-toggle
bindd = SUPER SHIFT, BACKSPACE, Toggle window gaps, exec, journey-hyprland-window-gaps-toggle
bindd = SUPER CTRL, BACKSPACE, Toggle single-window square aspect, exec, journey-hyprland-window-single-square-aspect-toggle

# Notifications
bindd = SUPER, COMMA, Dismiss last notification, exec, makoctl dismiss
bindd = SUPER SHIFT, COMMA, Dismiss all notifications, exec, makoctl dismiss --all
bindd = SUPER CTRL, COMMA, Toggle silencing notifications, exec, journey-toggle-notification-silencing
bindd = SUPER ALT, COMMA, Invoke last notification, exec, makoctl invoke
bindd = SUPER SHIFT ALT, COMMA, Restore last notification, exec, makoctl restore

# Toggles
bindd = SUPER CTRL, I, Toggle locking on idle, exec, journey-toggle-idle
bindd = SUPER CTRL, N, Toggle nightlight, exec, journey-toggle-nightlight
bindd = SUPER CTRL, Delete, Toggle laptop display, exec, journey-hyprland-monitor-internal toggle
bindd = SUPER CTRL ALT, Delete, Toggle laptop display mirroring, exec, journey-hyprland-monitor-internal-mirror toggle
bindl = , switch:on:Lid Switch, exec, journey-hw-external-monitors && journey-hyprland-monitor-internal off
bindl = , switch:off:Lid Switch, exec, journey-hyprland-monitor-internal on

# Captures
bindd = , PRINT, Screenshot, exec, journey-capture-screenshot
bindd = ALT, PRINT, Screenrecording, exec, journey-menu screenrecord
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a
bindd = SUPER CTRL, PRINT, Extract text (OCR) from screenshot, exec, journey-capture-text-extraction

# File sharing
bindd = SUPER CTRL, S, Share, exec, journey-menu share

# Transcoding
bindd = SUPER CTRL, PERIOD, Transcode, exec, journey-transcode

# Reminders
bindd = SUPER CTRL, R, Set reminder, exec, journey-menu reminder-set
bindd = SUPER CTRL ALT, R, Show reminders, exec, journey-reminder show
bindd = SUPER SHIFT CTRL, R, Clear reminders, exec, journey-reminder clear

# Waybar-less information
bindd = SUPER CTRL ALT, T, Show time, exec, notify-send -u low "    $(date +"%A %H:%M  ·  %d %B %Y  ·  Week %V")"
bindd = SUPER CTRL ALT, B, Show battery remaining, exec, notify-send -u low "$(journey-battery-status)"
bindd = SUPER CTRL ALT, W, Show weather, exec, notify-send -u low "$(journey-weather-status)"

# Control panels
bindd = SUPER CTRL, A, Audio controls, exec, journey-launch-audio
bindd = SUPER CTRL, B, Bluetooth controls, exec, journey-launch-bluetooth
bindd = SUPER CTRL, W, Wifi controls, exec, journey-launch-wifi
bindd = SUPER CTRL, T, Activity, exec, journey-launch-tui btop

# Dictation
bindd = SUPER CTRL, X, Toggle dictation, exec, voxtype record toggle
bindd  = , F9, Start dictation (push-to-talk), exec, voxtype record start
binddr = , F9, Stop dictation (push-to-talk),  exec, voxtype record stop

# Zoom
bindd = SUPER CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = SUPER CTRL ALT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1

# Lock system
bindd = SUPER CTRL, L, Lock system, exec, journey-system-lock
