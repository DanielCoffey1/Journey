# Journey Companion — Hyprland entry point.
# Learn how to configure Hyprland: https://wiki.hypr.land/Configuring/

# Defaults shipped with Journey (don't edit — they get overwritten on update)
source = ~/.local/share/journey/default/hypr/envs.conf
source = ~/.local/share/journey/default/hypr/looknfeel.conf
source = ~/.local/share/journey/default/hypr/input.conf
source = ~/.local/share/journey/default/hypr/windows.conf
source = ~/.local/share/journey/default/hypr/autostart.conf
source = ~/.local/share/journey/default/hypr/bindings/utilities.conf
source = ~/.local/share/journey/default/hypr/bindings/clipboard.conf
source = ~/.local/share/journey/default/hypr/bindings/tiling.conf
source = ~/.local/share/journey/default/hypr/bindings/media.conf
source = ~/.local/share/journey/default/hypr/bindings.conf
source = ~/.config/journey/current/theme/hyprland.conf

# Toggle config flags dynamically (managed by `journey toggle …`)
source = ~/.local/state/journey/toggles/hypr/*.conf

# User overrides — edit these freely. Their settings win.
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/autostart.conf
