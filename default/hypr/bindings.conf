# Journey-default application bindings.
# These mirror the user's existing Omarchy setup 1:1, rebranded to journey-*.

# Core apps
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(journey-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(journey-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, journey-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(journey-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, journey-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, journey-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, journey-launch-or-focus spotify
bindd = SUPER SHIFT ALT, M, Music TUI, exec, journey-launch-or-focus-tui cliamp
bindd = SUPER SHIFT, N, Editor, exec, journey-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, journey-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, journey-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, journey-launch-or-focus ^obsidian$ "uwsm-app -- obsidian"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# Webapps. Reminder: if your URL contains a `#`, type it as `##` here so
# hyprland doesn't treat the rest of the line as a comment.
bindd = SUPER SHIFT, A, ChatGPT, exec, journey-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, journey-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, journey-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, journey-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, journey-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, journey-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, journey-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, journey-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, journey-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, journey-launch-webapp "https://x.com/compose/post"

# Add your own bindings below. Anything here wins over the defaults sourced earlier.
