# Journey-default hypridle.
# - Locks after 5 minutes
# - Sleeps the display after 10 minutes
# (No automatic suspend by default — add a listener locally if you want it.)
general {
    lock_cmd          = pidof hyprlock || journey-system-lock
    before_sleep_cmd  = journey-system-lock
    after_sleep_cmd   = journey-system-wake
    inhibit_sleep     = 3
}

listener {
    timeout    = 300
    on-timeout = journey-system-lock
}

listener {
    timeout    = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
