# Journey-default mako settings. Theme files (theme/mako.ini) include this and
# add their colors on top.
anchor=top-right
group-by=app-name,summary,body
default-timeout=5000
width=420
outer-margin=20
padding=10,15
border-size=2
max-icon-size=32
font=sans-serif 14px

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

# Notify-send is the trustworthy escape hatch — never silence it.
[mode=do-not-disturb app-name=notify-send]
invisible=false

[urgency=critical]
default-timeout=0
layer=overlay

[summary~="Screenshot"]
max-icon-size=80
format=<b>%s</b>\n%b
