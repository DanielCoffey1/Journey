name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint bin/, hooks/, default/, install.sh
        run: |
          set -e
          mapfile -t files < <(
            find bin hooks default/waybar -type f \( -perm -u+x -o -name '*.sh' \) 2>/dev/null
            echo install.sh
          )
          failed=0
          for f in "${files[@]}"; do
            echo "=== $f ==="
            if ! shellcheck -x -S warning "$f"; then
              failed=1
            fi
          done
          exit $failed
